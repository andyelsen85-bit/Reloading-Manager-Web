openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Reloading Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cartridges
    description: Cartridge inventory
  - name: bullets
    description: Bullet inventory
  - name: powders
    description: Powder inventory
  - name: primers
    description: Primer inventory
  - name: loads
    description: Load records and workflow steps
  - name: dashboard
    description: Overview and reporting
  - name: settings
    description: Application settings
  - name: users
    description: User management
  - name: auth
    description: Authentication
  - name: reference
    description: Reference data (calibers, manufacturers)
  - name: chargeLadders
    description: Load development charge ladders

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ─────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update own profile (email, notifications)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "204":
          description: Password changed
        "401":
          description: Not authenticated

  # ── Users ─────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserRecord"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRecord"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRecord"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users/{id}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset user password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "204":
          description: Password reset

  # ── Reference Data ────────────────────────────────────────────
  /reference/{category}:
    get:
      operationId: listReferenceData
      tags: [reference]
      summary: List reference data by category
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reference data list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferenceItem"
    post:
      operationId: createReferenceItem
      tags: [reference]
      summary: Add a reference data item
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferenceItemBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceItem"

  /reference/{category}/{id}:
    patch:
      operationId: updateReferenceItem
      tags: [reference]
      summary: Update a reference data item
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReferenceItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceItem"
    delete:
      operationId: deleteReferenceItem
      tags: [reference]
      summary: Delete a reference data item
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Settings ─────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # ── Cartridges ──────────────────────────────────────────────
  /cartridges:
    get:
      operationId: listCartridges
      tags: [cartridges]
      summary: List all cartridge batches
      responses:
        "200":
          description: List of cartridges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cartridge"
    post:
      operationId: createCartridge
      tags: [cartridges]
      summary: Add a cartridge batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCartridgeBody"
      responses:
        "201":
          description: Created cartridge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cartridge"

  /cartridges/{id}:
    get:
      operationId: getCartridge
      tags: [cartridges]
      summary: Get a cartridge batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cartridge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cartridge"
    patch:
      operationId: updateCartridge
      tags: [cartridges]
      summary: Update a cartridge batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartridgeBody"
      responses:
        "200":
          description: Updated cartridge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cartridge"
    delete:
      operationId: deleteCartridge
      tags: [cartridges]
      summary: Delete a cartridge batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Bullets ─────────────────────────────────────────────────
  /bullets:
    get:
      operationId: listBullets
      tags: [bullets]
      summary: List all bullets
      responses:
        "200":
          description: List of bullets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bullet"
    post:
      operationId: createBullet
      tags: [bullets]
      summary: Add a bullet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBulletBody"
      responses:
        "201":
          description: Created bullet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bullet"

  /bullets/{id}:
    patch:
      operationId: updateBullet
      tags: [bullets]
      summary: Update a bullet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBulletBody"
      responses:
        "200":
          description: Updated bullet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bullet"
    delete:
      operationId: deleteBullet
      tags: [bullets]
      summary: Delete a bullet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Powders ─────────────────────────────────────────────────
  /powders:
    get:
      operationId: listPowders
      tags: [powders]
      summary: List all powders
      responses:
        "200":
          description: List of powders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Powder"
    post:
      operationId: createPowder
      tags: [powders]
      summary: Add a powder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePowderBody"
      responses:
        "201":
          description: Created powder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Powder"

  /powders/{id}:
    patch:
      operationId: updatePowder
      tags: [powders]
      summary: Update a powder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePowderBody"
      responses:
        "200":
          description: Updated powder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Powder"
    delete:
      operationId: deletePowder
      tags: [powders]
      summary: Delete a powder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Primers ─────────────────────────────────────────────────
  /primers:
    get:
      operationId: listPrimers
      tags: [primers]
      summary: List all primers
      responses:
        "200":
          description: List of primers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Primer"
    post:
      operationId: createPrimer
      tags: [primers]
      summary: Add a primer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrimerBody"
      responses:
        "201":
          description: Created primer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Primer"

  /primers/{id}:
    patch:
      operationId: updatePrimer
      tags: [primers]
      summary: Update a primer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrimerBody"
      responses:
        "200":
          description: Updated primer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Primer"
    delete:
      operationId: deletePrimer
      tags: [primers]
      summary: Delete a primer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Loads ────────────────────────────────────────────────────
  /loads:
    get:
      operationId: listLoads
      tags: [loads]
      summary: List all loads
      responses:
        "200":
          description: List of loads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Load"
    post:
      operationId: createLoad
      tags: [loads]
      summary: Create a new load
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoadBody"
      responses:
        "201":
          description: Created load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Load"

  /loads/{id}:
    get:
      operationId: getLoad
      tags: [loads]
      summary: Get a load
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Load"
    patch:
      operationId: updateLoad
      tags: [loads]
      summary: Update load data / advance step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoadBody"
      responses:
        "200":
          description: Updated load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Load"
    delete:
      operationId: deleteLoad
      tags: [loads]
      summary: Delete a load (with optional restock)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteLoadBody"
      responses:
        "204":
          description: Deleted

  /loads/{id}/complete:
    post:
      operationId: completeLoad
      tags: [loads]
      summary: Mark load as completed, deduct inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Load"

  /loads/{id}/fire:
    post:
      operationId: fireLoad
      tags: [loads]
      summary: Mark completed load as fired
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FireLoadBody"
      responses:
        "200":
          description: Fired load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Load"

  # ── Charge Ladders ────────────────────────────────────────────
  /charge-ladders:
    get:
      operationId: listChargeLadders
      tags: [chargeLadders]
      summary: List all charge ladders
      responses:
        "200":
          description: List of charge ladders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChargeLadder"
    post:
      operationId: createChargeLadder
      tags: [chargeLadders]
      summary: Create a charge ladder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChargeLadderBody"
      responses:
        "201":
          description: Created charge ladder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeLadder"

  /charge-ladders/{id}:
    get:
      operationId: getChargeLadder
      tags: [chargeLadders]
      summary: Get a charge ladder with its levels
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Charge ladder with levels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeLadderDetail"
    patch:
      operationId: updateChargeLadder
      tags: [chargeLadders]
      summary: Update a charge ladder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChargeLadderBody"
      responses:
        "200":
          description: Updated charge ladder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeLadder"
    delete:
      operationId: deleteChargeLadder
      tags: [chargeLadders]
      summary: Delete a charge ladder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /charge-ladders/{id}/levels:
    post:
      operationId: addChargeLevel
      tags: [chargeLadders]
      summary: Add a charge level to a ladder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChargeLevelBody"
      responses:
        "201":
          description: Created charge level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeLevel"

  /charge-ladders/{id}/levels/{levelId}:
    patch:
      operationId: updateChargeLevel
      tags: [chargeLadders]
      summary: Update a charge level (record results)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: levelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChargeLevelBody"
      responses:
        "200":
          description: Updated charge level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeLevel"
    delete:
      operationId: deleteChargeLevel
      tags: [chargeLadders]
      summary: Delete a charge level
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: levelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /charge-ladders/{id}/select-best:
    post:
      operationId: selectBestChargeLevel
      tags: [chargeLadders]
      summary: Select the best performing charge level
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectBestLevelBody"
      responses:
        "200":
          description: Updated ladder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargeLadder"

  # ── Dashboard ────────────────────────────────────────────────
  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: Overview counts and low-stock warnings
      responses:
        "200":
          description: Dashboard overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/history:
    get:
      operationId: getReloadHistory
      tags: [dashboard]
      summary: Reload history summary per cartridge
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  /dashboard/export:
    get:
      operationId: exportData
      tags: [dashboard]
      summary: Export all data as JSON
      responses:
        "200":
          description: All data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        notificationsEnabled:
          type: boolean
      required: [id, username, email, role, notificationsEnabled]

    UserRecord:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
        notificationsEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, role, active, notificationsEnabled, createdAt]

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
        notificationsEnabled:
          type: boolean
      required: [username, email, password]

    UpdateUserBody:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
        notificationsEnabled:
          type: boolean

    ResetPasswordBody:
      type: object
      properties:
        newPassword:
          type: string
      required: [newPassword]

    UpdateProfileBody:
      type: object
      properties:
        email:
          type: string
          nullable: true
        notificationsEnabled:
          type: boolean

    ChangePasswordBody:
      type: object
      properties:
        newPassword:
          type: string
      required: [newPassword]

    ReferenceItem:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        value:
          type: string
        sortOrder:
          type: integer
      required: [id, category, value, sortOrder]

    CreateReferenceItemBody:
      type: object
      properties:
        value:
          type: string
        sortOrder:
          type: integer
      required: [value]

    UpdateReferenceItemBody:
      type: object
      properties:
        value:
          type: string
        sortOrder:
          type: integer

    Settings:
      type: object
      properties:
        id:
          type: integer
        bulletLowStockThreshold:
          type: integer
        powderLowStockThreshold:
          type: number
        primerLowStockThreshold:
          type: integer
        nextLoadNumber:
          type: integer
        logoBase64:
          type: string
          nullable: true
        backgroundBase64:
          type: string
          nullable: true
        smtpHost:
          type: string
          nullable: true
        smtpPort:
